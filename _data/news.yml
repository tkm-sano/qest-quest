- date: "2026-04-13"
  slug: "qcnc-workshop-2026"
  slug_en: "qcnc-workshop-2026-en"
  title: "QCNC 2026にてワークショップ「Connecting the Dots」を実施しました"
  title_en: "Workshop \"Connecting the Dots\" Held at QCNC 2026"
  desc: "QCNC 2026にて、量子技術と社会の接続をテーマとするワークショップ「Connecting the Dots: Technology, People, and Society in the Quantum Era」を実施しました。Future Design、Public Engagement、SFプロトタイピングを手がかりに、量子技術のユースケース・条件・懸念を参加型で議論しました。"
  desc_en: "At QCNC 2026, we held the workshop \"Connecting the Dots: Technology, People, and Society in the Quantum Era\" on connecting quantum technologies with society. Drawing on future design, public engagement, and SF prototyping, the session invited participants to discuss use cases, enabling conditions, and concerns around quantum technologies."
  image: "assets/img/news/qcnc-workshop-2026.jpg"
  link: "/projects/qcnc-workshop-2026/"
  link_en: "/en/projects/qcnc-workshop-2026-en/"

- date: "2025-11-17 09:00:00 +0900"
  slug: "quantum-network-autoconfig-press-2025"
  slug_en: "quantum-network-autoconfig-press-2025-en"
  title: "永山翔太准教授らが量子ネットワークの自動設定技術を開発しました"
  title_en: "Toward Automated Quantum Network Construction ―Automatic Configuration Technology for \"Plug-and-Play\" Quantum Network Devices―"
  desc: "慶應義塾大学大学院メディアデザイン研究科の永山翔太准教授らは、株式会社メルカリと共同で、量子ネットワークの構成および接続状態を自動的に把握可能とする手法を開発し、自動設定の効率化を実現しました。本研究成果は、2025年9月5日に開催された国際会議「IEEE Quantum Week 2025」において発表され、論文「Automatic Configuration Protocols for Optical Quantum Networks」は、Quantum Networking & Communications（QNET）部門においてBest Paper Award 2nd placeを受賞しました。"
  desc_en: "Associate Professor Shota Nagayama at the Graduate School of Media Design and his research team at Keio University, in collaboration with Mercari, Inc., have developed a method to automatically detect the configuration and connection status of quantum networks, thereby streamlining the process of automatic setup. This research was presented at the international quantum computing conference \"QCE25\" on September 5, 2025, where the paper \"Automatic Configuration Protocols for Optical Quantum Networks\" received the Best Paper Award 2nd place in the Quantum Networking & Communications (QNET) division."
  image: "assets/img/news/plug-and-play-quantum-network-devices.jpg"
  link: "https://www.keio.ac.jp/ja/press-releases/2025/11/17/28-170839/"
  link_en: "https://www.keio.ac.jp/en/press-releases/2025/Nov/17/49-170841/"

